# ─────────────────────────────────────────────
# Paths: Users
# Endpoints de perfil de usuario
# Requieren JWT (Bearer token)
#
# Archivo de referencia por modelo.
# La spec completa está en: ../openapi.yaml
# ─────────────────────────────────────────────

# GET /api/users/me
me:
  get:
    tags: [Usuarios]
    summary: Obtener perfil del usuario autenticado
    description: |
      Devuelve los datos del usuario autenticado junto con su balance
      general calculado dinámicamente como:
      `SUM(income) - SUM(expense) - SUM(transfer)`
    operationId: getUserProfile
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Perfil del usuario con balance
        content:
          application/json:
            example:
              success: true
              data:
                id: 1
                username: "isaac"
                email: "isaac@fynz.app"
                created_at: "2026-03-10T23:00:00.000Z"
                balance: 14570.00
      "401":
        description: Token JWT faltante, inválido o expirado
        content:
          application/json:
            example:
              success: false
              message: "Token inválido o expirado"
      "404":
        description: Usuario no encontrado
        content:
          application/json:
            example:
              success: false
              message: "Usuario no encontrado"
