                    id: 1
                    email: "isaac@fynz.app"
                    username: "isaac"
        "400":
          description: Formato de datos incorrecto
          content:
            application/json:
              example:
                success: false
                message: "Formato de datos incorrecto"
        "401":
          description: Credenciales invГЎlidas
          content:
            application/json:
              example:
                success: false
                message: "Credenciales invГЎlidas"

