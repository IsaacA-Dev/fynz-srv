openapi: 3.0.3

info:
  title: Fynz API
  version: 1.0.0
  description: |
    ## рџ’° Fynz вЂ” Calculadora Inteligente de Gastos

    API REST para la aplicaciГіn Fynz, un sistema de gestiГіn financiera personal
    que permite a los usuarios:

    - **Registrar transacciones** (ingresos, gastos y transferencias)
    - **Organizar dinero en bolsillos** de ahorro con metas
    - **Clasificar movimientos** con categorГ­as personalizables
    - **Consultar resГєmenes financieros** con desglose por categorГ­a

    ### Conceptos Clave

    | Concepto | DescripciГіn |
    |----------|-------------|
    | **Balance General** | Calculado dinГЎmicamente: `SUM(income) - SUM(expense) - SUM(transfer)` |
    | **Bolsillos (Pockets)** | Cuentas virtuales de ahorro con metas. Se alimentan con transacciones tipo `transfer` |
    | **CategorГ­as** | Clasificadores para transacciones. Hay 10 del sistema + personalizadas por usuario |
    | **Tipos de TransacciГіn** | `income` (ingreso), `expense` (gasto), `transfer` (transferencia a bolsillo) |

    ### AutenticaciГіn

    Todos los endpoints (excepto `/auth/register` y `/auth/login`) requieren un
    **JWT token** en el header `Authorization`:

    ```
    Authorization: Bearer <token>
    ```

    El token se obtiene al hacer login y expira en 1 dГ­a (configurable).
  contact:
    name: Isaac вЂ” Fynz Dev
  license:
    name: MIT

servers:
  - url: http://localhost:3000/api
    description: Servidor de desarrollo local

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# TAGS
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

tags:
  - name: AutenticaciГіn
    description: |
      Registro de usuarios e inicio de sesiГіn.
      Estos endpoints **no requieren** token JWT.
  - name: Usuarios
    description: |
      Perfil del usuario autenticado.
      Incluye balance general calculado dinГЎmicamente.
  - name: CategorГ­as
    description: |
      CRUD de categorГ­as para clasificar transacciones.
      El sistema incluye 10 categorГ­as por defecto (no editables).
      Los usuarios pueden crear categorГ­as personalizadas.
  - name: Bolsillos
    description: |
      CRUD de bolsillos de ahorro.
      Cada bolsillo tiene una meta (`target_amount`) y un saldo
      calculado dinГЎmicamente (`current_amount`).
  - name: Transacciones
    description: |
      Motor principal de Fynz. Registro, consulta y eliminaciГіn
      de movimientos financieros con soporte para filtros y paginaciГіn.

