  /auth/register:
    post:
      tags: [AutenticaciГіn]
      summary: Registrar nuevo usuario
      description: |
        Crea una cuenta nueva en Fynz. El email y username deben ser Гєnicos.
        El email se convierte automГЎticamente a minГєsculas.
        La contraseГ±a se hashea con bcrypt antes de almacenarse.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: "isaac@fynz.app"
              username: "isaac"
              password: "miPassword123"
      responses:
        "201":
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/UserPublic"
              example:
                success: true
                message: "Usuario creado con Г©xito"
