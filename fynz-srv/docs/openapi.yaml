  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # POCKETS
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  /pockets:
    get:
      tags: [Bolsillos]
      summary: Listar bolsillos del usuario
      description: |
        Devuelve todos los bolsillos del usuario autenticado con:
        - **current_amount**: saldo calculado dinГЎmicamente (SUM de transfers)
        - **progress**: porcentaje de avance hacia la meta

        Ordenados por fecha de creaciГіn (mГЎs recientes primero).
      operationId: listPockets
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Lista de bolsillos con saldos calculados
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Pocket"
              example:
                success: true
                data:
                  - id: 1
                    name: "Vacaciones CancГєn"
                    target_amount: 25000.00
                    current_amount: 8500.00
                    color: "#3b82f6"
                    icon: "рџЏ–пёЏ"
                    progress: 34.0
                    user_id: 1
                    created_at: "2026-03-10T23:00:00.000Z"
                  - id: 2
                    name: "Fondo de Emergencia"
                    target_amount: 50000.00
                    current_amount: 15000.00
                    color: "#10b981"
                    icon: "рџ›ЎпёЏ"
                    progress: 30.0
                    user_id: 1
                    created_at: "2026-03-08T10:00:00.000Z"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

    post:
      tags: [Bolsillos]
      summary: Crear nuevo bolsillo
      description: |
        Crea un bolsillo de ahorro para organizar dinero por metas.
        El saldo inicial siempre es 0 вЂ” se incrementa con transacciones
        de tipo `transfer`.
      operationId: createPocket
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePocketRequest"
            examples:
              con_meta:
                summary: Con meta de ahorro
                value:
                  name: "Auto nuevo"
                  target_amount: 180000.00
                  color: "#f59e0b"
                  icon: "рџљ—"
              basico:
                summary: Sin meta (solo organizar)
                value:
                  name: "Gastos compartidos"
      responses:
        "201":
          description: Bolsillo creado
          content:
            application/json:
              example:
                success: true
                message: "Bolsillo creado"
                data:
                  id: 1
                  name: "Auto nuevo"
                  target_amount: 180000.00
                  color: "#f59e0b"
                  icon: "рџљ—"
                  current_amount: 0
                  progress: 0
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /pockets/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID del bolsillo
        schema:
          type: integer
          example: 1

    get:
      tags: [Bolsillos]
      summary: Obtener un bolsillo por ID
      description: |
        Devuelve los detalles de un bolsillo especГ­fico del usuario,
        incluyendo su saldo actual y progreso calculados dinГЎmicamente.
      operationId: getPocketById
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Detalle del bolsillo
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Pocket"
              example:
                success: true
                data:
                  id: 1
                  name: "Vacaciones CancГєn"
                  target_amount: 25000.00
                  current_amount: 8500.00
                  color: "#3b82f6"
                  icon: "рџЏ–пёЏ"
                  progress: 34.0
                  user_id: 1
                  created_at: "2026-03-10T23:00:00.000Z"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags: [Bolsillos]
      summary: Actualizar bolsillo
      description: |
        Actualiza los datos de un bolsillo existente.
        Se requiere al menos un campo para actualizar.
        **No modifica las transacciones asociadas.**
      operationId: updatePocket
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePocketRequest"
            example:
              name: "Vacaciones Europa 2027"
              target_amount: 60000.00
      responses:
        "200":
          description: Bolsillo actualizado
          content:
            application/json:
              example:
                success: true
                message: "Bolsillo actualizado"
                data:
                  id: 1
                  name: "Vacaciones Europa 2027"
                  target_amount: 60000.00
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      tags: [Bolsillos]
      summary: Eliminar bolsillo
      description: |
        Elimina un bolsillo del usuario. Las transacciones asociadas
        conservarГЎn su registro pero con pocket_id = NULL (ON DELETE SET NULL).
      operationId: deletePocket
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Bolsillo eliminado
          content:
            application/json:
              example:
                success: true
                message: "Bolsillo eliminado"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # TRANSACTIONS
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  /transactions:
    get:
      tags: [Transacciones]
      summary: Listar transacciones con filtros y paginaciГіn
      description: |
        Devuelve las transacciones del usuario autenticado con soporte para:
        - **Filtrado** por tipo, categorГ­a, bolsillo y rango de fechas
        - **PaginaciГіn** con limit/offset

        Ordenadas por fecha descendente (mГЎs recientes primero).
      operationId: listTransactions
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          description: Filtrar por tipo de transacciГіn
          schema:
            type: string
            enum: [income, expense, transfer]
        - name: category_id
          in: query
          required: false
          description: Filtrar por ID de categorГ­a
          schema:
            type: integer
        - name: pocket_id
          in: query
          required: false
          description: Filtrar por ID de bolsillo
          schema:
            type: integer
        - name: from
          in: query
          required: false
          description: "Fecha inicio del rango (ISO 8601)"
          schema:
            type: string
            format: date-time
            example: "2026-03-01T00:00:00.000Z"
        - name: to
          in: query
          required: false
          description: "Fecha fin del rango (ISO 8601)"
          schema:
            type: string
            format: date-time
            example: "2026-03-31T23:59:59.000Z"
        - name: limit
          in: query
          required: false
          description: "Registros por pГЎgina (1-100, default: 50)"
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          description: "Desplazamiento para paginaciГіn (default: 0)"
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Lista paginada de transacciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
              example:
                success: true
                data:
                  - id: 3
                    amount: 180.00
                    description: "Pizza con amigos"
                    type: "expense"
                    pocket_id: null
                    category_id: 1
                    user_id: 1
                    date: "2026-03-10T20:00:00.000Z"
                    created_at: "2026-03-10T20:00:00.000Z"
                  - id: 2
                    amount: 250.00
                    description: "Uber al trabajo"
                    type: "expense"
                    pocket_id: null
                    category_id: 2
                    user_id: 1
                    date: "2026-03-10T15:30:00.000Z"
                    created_at: "2026-03-10T15:30:00.000Z"
                pagination:
                  total: 147
                  limit: 50
                  offset: 0
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

    post:
      tags: [Transacciones]
      summary: Registrar nueva transacciГіn
      description: |
        Crea un nuevo movimiento financiero. Reglas de negocio:

        - **income**: Suma al balance general del usuario
        - **expense**: Resta del balance general del usuario
        - **transfer**: Resta del general y suma al bolsillo destino.
          Requiere `pocket_id` obligatorio.

        Validaciones:
        - `amount` debe ser mayor a 0
        - Si se envГ­a `pocket_id`, debe existir y pertenecer al usuario
        - Si se envГ­a `category_id`, debe ser accesible para el usuario
        - Si `type = 'transfer'`, `pocket_id` es **obligatorio**
      operationId: createTransaction
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
            examples:
              ingreso:
                summary: "рџ’° Registrar ingreso (nГіmina)"
                value:
                  amount: 15000.00
                  description: "NГіmina quincenal"
                  type: "income"
                  category_id: 9
              gasto:
                summary: "рџ’ё Registrar gasto"
                value:
                  amount: 250.00
                  description: "Uber al trabajo"
                  type: "expense"
                  category_id: 2
              transferencia:
                summary: "рџЏ¦ Transferir a bolsillo"
                value:
                  amount: 3000.00
                  description: "Ahorro quincenal"
                  type: "transfer"
                  pocket_id: 1
              gasto_con_fecha:
                summary: "рџ“… Gasto con fecha personalizada"
                value:
                  amount: 180.00
                  description: "Pizza con amigos"
                  type: "expense"
                  category_id: 1
                  date: "2026-03-08T20:00:00.000Z"
      responses:
        "201":
          description: TransacciГіn registrada
          content:
            application/json:
              example:
                success: true
                message: "TransacciГіn registrada"
                data:
                  id: 1
                  amount: 250.00
                  description: "Uber al trabajo"
                  type: "expense"
                  pocket_id: null
                  category_id: 2
        "400":
          description: |
            Datos invГЎlidos. Posibles errores:
            - Monto no es positivo
            - Tipo invГЎlido
            - Transfer sin pocket_id
          content:
            application/json:
              examples:
                sin_pocket:
                  summary: Transfer sin pocket_id
                  value:
                    success: false
                    message: "Las transferencias requieren un bolsillo destino (pocket_id)"
                tipo_invalido:
                  summary: Tipo invГЎlido
                  value:
                    success: false
                    message: "Datos invГЎlidos"
                    errors:
                      type:
                        _errors: ["Tipo debe ser: income, expense o transfer"]
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Pocket o categorГ­a no encontrada
          content:
            application/json:
              example:
                success: false
                message: "Bolsillo no encontrado o no te pertenece"

  /transactions/summary:
    get:
      tags: [Transacciones]
      summary: Obtener resumen financiero
      description: |
        Devuelve un resumen completo de las finanzas del usuario:
        - **Totales**: ingreso, gasto, transferencias, balance
        - **Desglose**: gastos agrupados por categorГ­a (mayor a menor)

        Гљtil para el dashboard principal de la aplicaciГіn.
      operationId: getTransactionSummary
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Resumen financiero
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/TransactionSummary"
              example:
                success: true
                data:
                  income: 30000.00
                  expense: 12450.00
                  transfer: 5000.00
                  balance: 12550.00
                  expenses_by_category:
                    - category_name: "AlimentaciГіn"
                      category_icon: "рџЌ”"
                      category_color: "#ef4444"
                      total: 4500.00
                    - category_name: "Transporte"
                      category_icon: "рџљ—"
                      category_color: "#f59e0b"
                      total: 3200.00
                    - category_name: "Entretenimiento"
                      category_icon: "рџЋ¬"
                      category_color: "#8b5cf6"
                      total: 2100.00
                    - category_name: "Servicios"
                      category_icon: "рџ“±"
                      category_color: "#ec4899"
                      total: 1650.00
                    - category_name: "Personal"
                      category_icon: "рџ‘¤"
                      category_color: "#14b8a6"
                      total: 1000.00
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /transactions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID de la transacciГіn
        schema:
          type: integer
          example: 1

    get:
      tags: [Transacciones]
      summary: Obtener una transacciГіn por ID
      description: Devuelve los detalles de una transacciГіn especГ­fica del usuario.
      operationId: getTransactionById
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Detalle de la transacciГіn
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Transaction"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      tags: [Transacciones]
      summary: Eliminar transacciГіn
      description: |
        Elimina una transacciГіn del usuario. Esto afecta automГЎticamente
        el balance general y el saldo del pocket (si aplica), ya que
        ambos se calculan dinГЎmicamente.
      operationId: deleteTransaction
      security:
        - BearerAuth: []
      responses:
        "200":
          description: TransacciГіn eliminada
          content:
            application/json:
              example:
                success: true
                message: "TransacciГіn eliminada"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# COMPONENTS
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

components:
  # в”Ђв”Ђв”Ђ Seguridad в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token JWT obtenido del endpoint `/auth/login`.
        Header: `Authorization: Bearer <token>`

  # в”Ђв”Ђв”Ђ Schemas в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  schemas:
    # в”Ђв”Ђв”Ђ User в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    User:
      type: object
      description: Usuario registrado en Fynz
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          minLength: 3
          maxLength: 20
          example: "isaac"
        email:
          type: string
          format: email
          example: "isaac@fynz.app"
        created_at:
          type: string
          format: date-time
          example: "2026-03-10T23:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-10T23:00:00.000Z"
      required: [id, username, email]

    UserProfile:
      type: object
      description: Perfil del usuario con balance calculado dinГЎmicamente
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            balance:
              type: number
              format: double
              description: "Balance = SUM(income) - SUM(expense) - SUM(transfer)"
              example: 14570.00

    UserPublic:
      type: object
      description: Datos pГєblicos del usuario (sin info sensible)
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: "isaac@fynz.app"
        username:
          type: string
          example: "isaac"

    RegisterRequest:
      type: object
      description: Datos para registrar un nuevo usuario
      properties:
        email:
          type: string
          format: email
          example: "isaac@fynz.app"
        username:
          type: string
          minLength: 3
          maxLength: 20
          example: "isaac"
        password:
          type: string
          format: password
          minLength: 8
          example: "miPassword123"
      required: [email, username, password]

    LoginRequest:
      type: object
      description: Credenciales para iniciar sesiГіn
      properties:
        email:
          type: string
          format: email
          example: "isaac@fynz.app"
        password:
          type: string
          format: password
          example: "miPassword123"
      required: [email, password]

    LoginResponse:
      type: object
      description: Respuesta exitosa del login
      properties:
        token:
          type: string
          description: JWT token para autenticaciГіn
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          $ref: "#/components/schemas/UserPublic"

    # в”Ђв”Ђв”Ђ Category в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    Category:
      type: object
      description: |
        CategorГ­a para clasificar transacciones.
        is_default = 1: categorГ­a del sistema (no editable).
        is_default = 0: categorГ­a personalizada del usuario.
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          maxLength: 50
          example: "AlimentaciГіn"
        icon:
          type: string
          nullable: true
          example: "рџЌ”"
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
          example: "#ef4444"
        user_id:
          type: integer
          nullable: true
          description: "NULL = categorГ­a global del sistema"
          example: null
        is_default:
          type: integer
          enum: [0, 1]
          description: "1 = sistema (no editable), 0 = personalizada"
          example: 1
      required: [id, name]

    CreateCategoryRequest:
      type: object
      description: Datos para crear una categorГ­a personalizada
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: "Suscripciones"
        icon:
          type: string
          maxLength: 10
          example: "рџ“є"
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
          example: "#7c3aed"
      required: [name]

    UpdateCategoryRequest:
      type: object
      description: Datos para actualizar categorГ­a (mГ­nimo 1 campo)
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: "Streamings"
        icon:
          type: string
          maxLength: 10
          example: "рџЋ¬"
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
          example: "#a855f7"

    # в”Ђв”Ђв”Ђ Pocket в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    Pocket:
      type: object
      description: |
        Bolsillo de ahorro con meta.
        current_amount y progress se calculan dinГЎmicamente (no se almacenan).
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          maxLength: 50
          example: "Vacaciones CancГєn"
        target_amount:
          type: number
          format: double
          minimum: 0
          description: Meta de ahorro en pesos
          example: 25000.00
        current_amount:
          type: number
          format: double
          readOnly: true
          description: "Saldo = SUM(transactions WHERE pocket_id = this.id AND type = 'transfer')"
          example: 8500.00
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
          example: "#3b82f6"
        icon:
          type: string
          nullable: true
          example: "рџЏ–пёЏ"
        progress:
          type: number
          format: double
          readOnly: true
          minimum: 0
          maximum: 100
          description: "(current_amount / target_amount) * 100"
          example: 34.0
        user_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          example: "2026-03-10T23:00:00.000Z"
      required: [id, name, user_id]

    CreatePocketRequest:
      type: object
      description: Datos para crear un nuevo bolsillo
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: "Fondo de Emergencia"
        target_amount:
          type: number
          format: double
          minimum: 0
          default: 0
          example: 50000.00
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
          example: "#10b981"
        icon:
          type: string
          maxLength: 10
          example: "рџ›ЎпёЏ"
      required: [name]

    UpdatePocketRequest:
      type: object
      description: Datos para actualizar bolsillo (mГ­nimo 1 campo)
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: "Fondo de Emergencia 2026"
        target_amount:
          type: number
          format: double
          minimum: 0
          example: 75000.00
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
          example: "#059669"
        icon:
          type: string
          maxLength: 10
          example: "рџ’°"

    # в”Ђв”Ђв”Ђ Transaction в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    Transaction:
      type: object
      description: |
        Movimiento financiero.
        - income: suma al balance general
        - expense: resta del balance general
        - transfer: resta del general, suma al pocket
      properties:
        id:
          type: integer
          example: 1
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 250.00
        description:
          type: string
          nullable: true
          maxLength: 200
          example: "Uber al trabajo"
        type:
          type: string
          enum: [income, expense, transfer]
          example: "expense"
        pocket_id:
          type: integer
          nullable: true
          description: "Obligatorio si type = 'transfer'"
          example: null
        category_id:
          type: integer
          nullable: true
          example: 2
        user_id:
          type: integer
          example: 1
        date:
          type: string
          format: date-time
          example: "2026-03-10T15:30:00.000Z"
        created_at:
          type: string
          format: date-time
          example: "2026-03-10T23:00:00.000Z"
      required: [id, amount, type, user_id]

    CreateTransactionRequest:
      type: object
      description: |
        Datos para registrar transacciГіn.
        Si type = 'transfer', pocket_id es obligatorio.
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 250.00
        description:
          type: string
          maxLength: 200
          example: "Uber al trabajo"
        type:
          type: string
          enum: [income, expense, transfer]
          example: "expense"
        pocket_id:
          type: integer
          nullable: true
          description: "Obligatorio si type = 'transfer'"
          example: null
        category_id:
          type: integer
          nullable: true
          example: 2
        date:
          type: string
          format: date-time
          description: "Fecha personalizada (ISO 8601). Default: ahora"
          example: "2026-03-10T15:30:00.000Z"
      required: [amount, type]

    TransactionSummary:
      type: object
      description: Resumen financiero con totales y desglose por categorГ­a
      properties:
        income:
          type: number
          format: double
          example: 30000.00
        expense:
          type: number
          format: double
          example: 12450.00
        transfer:
          type: number
          format: double
          example: 5000.00
        balance:
          type: number
          format: double
          description: "income - expense - transfer"
          example: 12550.00
        expenses_by_category:
          type: array
          description: Gastos agrupados por categorГ­a (mayor a menor)
          items:
            type: object
            properties:
              category_name:
                type: string
                example: "AlimentaciГіn"
              category_icon:
                type: string
                example: "рџЌ”"
              category_color:
                type: string
                example: "#ef4444"
              total:
                type: number
                format: double
                example: 4500.00

    Pagination:
      type: object
      description: Metadatos de paginaciГіn
      properties:
        total:
          type: integer
          description: Total de registros
          example: 147
        limit:
          type: integer
          example: 50
        offset:
          type: integer
          example: 0

    # в”Ђв”Ђв”Ђ Respuestas comunes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Recurso no encontrado"

    ErrorValidation:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Datos invГЎlidos"
        errors:
          type: object
          description: Errores por campo (formato Zod)
          additionalProperties:
            type: object
            properties:
              _errors:
                type: array
                items:
                  type: string

  # в”Ђв”Ђв”Ђ Respuestas reutilizables в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  responses:
    UnauthorizedError:
      description: Token JWT faltante, invГЎlido o expirado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: "Token invГЎlido o expirado"

    NotFoundError:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: "Recurso no encontrado"

    ValidationError:
      description: Error de validaciГіn de datos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorValidation"

    ForbiddenError:
      description: No tienes permiso para esta acciГіn
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            message: "No tienes permiso para esta acciГіn"

