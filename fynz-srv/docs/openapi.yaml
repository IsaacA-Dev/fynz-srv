                message: "El email ya estГЎ registrado"

  /auth/login:
    post:
      tags: [AutenticaciГіn]
      summary: Iniciar sesiГіn
      description: |
        Autentica al usuario con email y contraseГ±a.
        Devuelve un JWT token con expiraciГіn de 1 dГ­a (configurable).
        El token debe enviarse en el header `Authorization: Bearer <token>`
        para acceder a endpoints protegidos.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: "isaac@fynz.app"
              password: "miPassword123"
      responses:
        "200":
