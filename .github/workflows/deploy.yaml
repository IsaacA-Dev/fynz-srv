# ═══════════════════════════════════════════════════════════════
# Fynz API — Deploy a Render.com
# Se ejecuta en cada push a main
# Requiere el secret RENDER_DEPLOY_HOOK_URL configurado en GitHub
# ═══════════════════════════════════════════════════════════════

name: Deploy API to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "❌ Error: RENDER_DEPLOY_HOOK_URL no está configurado en los Secrets de GitHub."
            exit 1
          fi
          
          # Hacemos el curl y verificamos el status code de HTTP
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ] || [ "$RESPONSE" -eq 202 ]; then
            echo "✅ Deploy triggered successfully on Render (HTTP $RESPONSE)"
          else
            echo "❌ Render respondió con error (HTTP $RESPONSE). Revisa tu Deploy Hook URL."
            exit 1
          fi
